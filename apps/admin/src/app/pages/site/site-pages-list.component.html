<div class="w-full max-w-2xl mx-auto">
  <div class="mb-5">
    <h2 class="text-xl font-bold">약관 / 안내 페이지</h2>
  </div>

  <div class="card bg-base-100 shadow-sm">
    <div class="divide-y divide-base-200">
      @for (page of mergedPages; track page.slug) {
        <div class="flex items-center justify-between px-6 py-4">
          <div>
            <p class="font-medium">{{ page.title }}</p>
            <p class="text-xs text-base-content/40 mt-0.5">
              @if (page.saved) {
                최근 수정: {{ page.saved.updatedAt | slice:0:10 }}
              } @else {
                미작성
              }
            </p>
          </div>
          <button class="btn btn-sm btn-outline" (click)="navigateToEdit(page.slug, page.title)">
            {{ page.saved ? '수정' : '작성' }}
          </button>
        </div>
      }
    </div>
  </div>
</div>
