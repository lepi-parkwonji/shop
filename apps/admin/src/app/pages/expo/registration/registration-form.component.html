<div class="w-full max-w-2xl pb-10 mx-auto">
  <div class="bg-base-100 rounded-box shadow-sm border border-base-200 overflow-hidden">
    <div class="p-6 border-b border-base-200 flex items-center justify-center relative bg-base-50">
      <button class="btn btn-sm btn-ghost btn-circle absolute left-6" (click)="goBack()">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
      </button>
      <h3 class="text-xl font-bold text-base-content">
        {{ isNew() ? '사전등록 수동 등록' : '사전등록 수정' }}
      </h3>
    </div>

    <div class="p-8 space-y-5">

      @if (!isNew() && item(); as reg) {
        <div class="bg-base-200/50 border border-base-300 rounded-xl p-4 text-sm text-base-content/70 flex gap-6">
          <div>예약번호 <span class="font-mono font-bold text-base-content ml-2">{{ reg.reservationNo }}</span></div>
          <div>신청일 <span class="text-base-content ml-2">{{ reg.createdAt | slice:0:10 }}</span></div>
        </div>
      }

      <div class="form-control">
        <label class="label pb-1" for="reg-name"><span class="label-text font-medium">이름 *</span></label>
        <input id="reg-name" type="text" class="input input-bordered w-full" [(ngModel)]="name" placeholder="이름을 입력하세요" maxlength="50" />
      </div>

      <div class="form-control">
        <label class="label pb-1" for="reg-contact"><span class="label-text font-medium">연락처 *</span></label>
        <input id="reg-contact" type="tel" class="input input-bordered w-full" [value]="contact" (input)="onContactInput($event)" placeholder="010-0000-0000" maxlength="13" />
      </div>

      <div class="form-control">
        <label class="label pb-1" for="reg-fair"><span class="label-text font-medium">참가 박람회 *</span></label>
        <select id="reg-fair" class="select select-bordered w-full" [(ngModel)]="fairName">
          <option value="">박람회를 선택하세요</option>
          @for (s of schedules(); track s.id) {
            <option [value]="s.fairName">{{ s.fairName }} ({{ s.year }} · {{ s.region }})</option>
          }
        </select>
      </div>

      <label class="flex items-start gap-3 cursor-pointer mt-2">
        <input type="checkbox" class="checkbox checkbox-sm mt-0.5" [(ngModel)]="marketingConsent" />
        <span class="text-sm">마케팅 정보 수신 동의</span>
      </label>

      @if (errorMsg()) {
        <p class="text-error text-sm">{{ errorMsg() }}</p>
      }

      <div class="flex gap-3 pt-4 border-t border-base-200">
        <button class="btn btn-outline flex-1" (click)="goBack()">목록으로</button>
        <button class="btn btn-primary flex-1" [disabled]="loading()" (click)="save()">
          {{ loading() ? '저장 중...' : '저장하기' }}
        </button>
      </div>

    </div>
  </div>
</div>
