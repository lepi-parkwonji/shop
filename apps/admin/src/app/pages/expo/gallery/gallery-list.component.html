<div class="w-full max-w-4xl mx-auto">
  <div class="flex justify-between items-center mb-5">
    <h2 class="text-xl font-bold">갤러리</h2>
    <button class="btn btn-primary btn-sm" (click)="navigateToNew()">+ 등록</button>
  </div>

  <div class="mb-4">
    <select class="select select-bordered select-sm w-full max-w-xs" [(ngModel)]="eventNameFilter" (ngModelChange)="onEventNameFilterChange()">
      <option value="">전체 행사</option>
      @for (s of schedules(); track s.id) {
        <option [value]="s.fairName">{{ s.fairName }} ({{ s.year }} {{ s.region }})</option>
      }
    </select>
  </div>

  <!-- 3×2 썸네일 그리드 -->
  @if (result()?.items?.length === 0) {
    <div class="flex flex-col items-center justify-center py-24 text-base-content/40">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-16 h-16 mb-4 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
      <p>등록된 갤러리가 없습니다.</p>
    </div>
  } @else {
    <div class="grid grid-cols-3 gap-4">
      @for (item of result()?.items; track item.id) {
        <div
          class="group relative bg-base-100 rounded-xl shadow-sm overflow-hidden cursor-pointer border border-base-200 hover:shadow-md transition-shadow"
          (click)="navigateToEdit(item)"
        >
          <!-- 썸네일 이미지 영역 (1:1 비율) -->
          <div class="aspect-video bg-base-200 overflow-hidden">
            @if (item.imageUrl) {
              <img
                [src]="item.imageUrl"
                [alt]="item.title"
                class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-200"
              />
            } @else {
              <div class="w-full h-full flex items-center justify-center text-base-content/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
              </div>
            }
          </div>

          <!-- 공개/비공개 토글 버튼 -->
          <div class="absolute top-2 right-2">
            <button
              class="btn btn-xs whitespace-nowrap shadow"
              [ngClass]="item.isExposed ? 'btn-success' : 'btn-outline btn-success bg-base-100'"
              (click)="toggleExpose(item, $event)"
            >{{ item.isExposed ? '공개' : '비공개' }}</button>
          </div>

          <!-- 호버 시 삭제 버튼 -->
          <div class="absolute top-2 left-2 opacity-0 group-hover:opacity-100 transition-opacity">
            <button
              class="btn btn-xs btn-error btn-outline bg-base-100"
              (click)="remove(item, $event)"
            >삭제</button>
          </div>

          <!-- 제목 + 날짜 -->
          <div class="p-3">
            <p class="text-sm font-medium truncate" [title]="item.title">{{ item.title }}</p>
            <p class="text-xs text-base-content/50 mt-0.5">{{ item.createdAt | slice:0:10 }}</p>
          </div>
        </div>
      }
    </div>
  }

  @if (result(); as pagedResult) {
    <app-pagination
      [pageNo]="pageNo()"
      [totalPages]="pagedResult.pageInfo.totalPages"
      [totalItems]="pagedResult.pageInfo.totalItems"
      (pageChange)="changePage($event)"
    />
  }
</div>
