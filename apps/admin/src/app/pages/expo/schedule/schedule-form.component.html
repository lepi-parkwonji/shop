<div class="w-full max-w-4xl pb-10 mx-auto">
  <div class="bg-base-100 rounded-box shadow-sm border border-base-200 overflow-hidden">

    <!-- 헤더 -->
    <div class="p-6 border-b border-base-200 flex items-center justify-center relative bg-base-50">
      <button class="btn btn-sm btn-ghost btn-circle absolute left-6" (click)="navigateBack()">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
      </button>
      <h3 class="text-xl font-bold text-base-content">
        {{ isEdit ? '박람회 수정' : '박람회 등록' }}
      </h3>
    </div>

    <div class="p-8 space-y-6">

      <!-- 기본 정보 -->
      <section>
        <h4 class="font-bold text-lg mb-5">기본 정보</h4>
        <div class="grid grid-cols-2 gap-y-6 gap-x-6 text-base">

          <div class="form-control col-span-2">
            <label class="label pb-1"><span class="label-text text-base-content/50">박람회명 *</span></label>
            <input type="text" class="input input-bordered w-full" [(ngModel)]="fairName"
              placeholder="예: 2026 서울 국제 AI 박람회" maxlength="100" />
          </div>

          <div class="form-control">
            <label class="label pb-1"><span class="label-text text-base-content/50">연도 *</span></label>
            <input type="number" class="input input-bordered w-full" [(ngModel)]="year" min="2020" max="2100" />
          </div>

          <div class="form-control">
            <label class="label pb-1"><span class="label-text text-base-content/50">지역 *</span></label>
            <input type="text" class="input input-bordered w-full" [(ngModel)]="region"
              placeholder="예: 서울" maxlength="50" />
          </div>

          <div class="form-control">
            <label class="label pb-1"><span class="label-text text-base-content/50">유형</span></label>
            <input type="text" class="input input-bordered w-full" [(ngModel)]="type"
              placeholder="예: MILLIONSHOW" />
          </div>

          <div class="form-control">
            <label class="label pb-1"><span class="label-text text-base-content/50">입장료 (원)</span></label>
            <input type="number" class="input input-bordered w-full" [(ngModel)]="entranceFee"
              min="0" placeholder="0 = 무료" />
          </div>

        </div>
      </section>

      <div class="divider"></div>

      <!-- 일정 및 장소 -->
      <section>
        <h4 class="font-bold text-lg mb-5">일정 및 장소</h4>
        <div class="grid grid-cols-2 gap-y-6 gap-x-6 text-base">

          <div class="form-control">
            <label class="label pb-1"><span class="label-text text-base-content/50">시작일시 *</span></label>
            <input type="datetime-local" class="input input-bordered w-full" [(ngModel)]="startTime" />
          </div>

          <div class="form-control">
            <label class="label pb-1"><span class="label-text text-base-content/50">종료일시 *</span></label>
            <input type="datetime-local" class="input input-bordered w-full" [(ngModel)]="endTime" />
          </div>

          <div class="form-control col-span-2">
            <label class="label pb-1"><span class="label-text text-base-content/50">장소 *</span></label>
            <input type="text" class="input input-bordered w-full" [(ngModel)]="place"
              placeholder="예: 코엑스 Hall A" maxlength="200" />
          </div>

        </div>
      </section>

      <div class="divider"></div>

      <!-- 안내 내용 -->
      <section>
        <h4 class="font-bold text-lg mb-5">안내 내용</h4>
        <div class="grid grid-cols-2 gap-y-6 gap-x-6 text-base">

          <div class="form-control col-span-2">
            <label class="label pb-1"><span class="label-text text-base-content/50">상세 내용 *</span></label>
            <textarea class="textarea textarea-bordered w-full" rows="4" [(ngModel)]="details"
              placeholder="박람회 상세 설명"></textarea>
          </div>

          <div class="form-control col-span-2">
            <label class="label pb-1"><span class="label-text text-base-content/50">유의사항</span></label>
            <textarea class="textarea textarea-bordered w-full" rows="2" [(ngModel)]="notice"
              placeholder="입장 시 유의사항 등"></textarea>
          </div>

          <div class="form-control col-span-2">
            <label class="label pb-1"><span class="label-text text-base-content/50">프로모션 / 이벤트 안내</span></label>
            <textarea class="textarea textarea-bordered w-full" rows="2" [(ngModel)]="eventNotes"
              placeholder="사전등록 할인, 증정 이벤트 등"></textarea>
          </div>

          <div class="form-control col-span-2">
            <label class="label pb-1"><span class="label-text text-base-content/50">썸네일 URL</span></label>
            <input type="text" class="input input-bordered w-full" [(ngModel)]="thumbnail"
              placeholder="https://..." />
          </div>

        </div>
      </section>

      @if (errorMsg()) {
        <p class="text-error text-sm">{{ errorMsg() }}</p>
      }

      <!-- 저장 버튼 -->
      <div class="flex gap-3 pt-6 border-t border-base-200">
        <button class="btn btn-outline flex-1" (click)="navigateBack()">목록으로</button>
        <button class="btn btn-primary flex-1" [disabled]="loading()" (click)="onSubmit()">
          {{ loading() ? '저장 중...' : '저장하기' }}
        </button>
      </div>

    </div>
  </div>
</div>
