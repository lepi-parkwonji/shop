<div class="w-full max-w-2xl">
  <div class="mb-5">
    <h2 class="text-xl font-bold">{{ isEdit ? '박람회 수정' : '박람회 등록' }}</h2>
  </div>

  <div class="card bg-base-100 shadow-sm">
    <div class="card-body gap-4">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <label class="form-control md:col-span-2">
          <div class="label px-0 pb-1"><span class="label-text font-medium">박람회명 *</span></div>
          <input class="input input-bordered w-full" type="text" [(ngModel)]="fairName" placeholder="예: 2026 서울 국제 AI 박람회" maxlength="100" />
        </label>

        <label class="form-control">
          <div class="label px-0 pb-1"><span class="label-text font-medium">연도 *</span></div>
          <input class="input input-bordered w-full" type="number" [(ngModel)]="year" min="2020" max="2100" />
        </label>

        <label class="form-control">
          <div class="label px-0 pb-1"><span class="label-text font-medium">지역 *</span></div>
          <input class="input input-bordered w-full" type="text" [(ngModel)]="region" placeholder="예: 서울" maxlength="50" />
        </label>

        <label class="form-control">
          <div class="label px-0 pb-1"><span class="label-text font-medium">유형</span></div>
          <input class="input input-bordered w-full" type="text" [(ngModel)]="type" placeholder="예: MILLIONSHOW" />
        </label>

        <label class="form-control">
          <div class="label px-0 pb-1"><span class="label-text font-medium">입장료 (원)</span></div>
          <input class="input input-bordered w-full" type="number" [(ngModel)]="entranceFee" min="0" placeholder="0 = 무료" />
        </label>

        <label class="form-control">
          <div class="label px-0 pb-1"><span class="label-text font-medium">시작일시 *</span></div>
          <input class="input input-bordered w-full" type="datetime-local" [(ngModel)]="startTime" />
        </label>

        <label class="form-control">
          <div class="label px-0 pb-1"><span class="label-text font-medium">종료일시 *</span></div>
          <input class="input input-bordered w-full" type="datetime-local" [(ngModel)]="endTime" />
        </label>

        <label class="form-control md:col-span-2">
          <div class="label px-0 pb-1"><span class="label-text font-medium">장소 *</span></div>
          <input class="input input-bordered w-full" type="text" [(ngModel)]="place" placeholder="예: 코엑스 Hall A" maxlength="200" />
        </label>

        <label class="form-control md:col-span-2">
          <div class="label px-0 pb-1"><span class="label-text font-medium">상세 내용 *</span></div>
          <textarea class="textarea textarea-bordered w-full" rows="4" [(ngModel)]="details" placeholder="박람회 상세 설명"></textarea>
        </label>

        <label class="form-control md:col-span-2">
          <div class="label px-0 pb-1"><span class="label-text font-medium">유의사항</span></div>
          <textarea class="textarea textarea-bordered w-full" rows="2" [(ngModel)]="notice" placeholder="입장 시 유의사항 등"></textarea>
        </label>

        <label class="form-control md:col-span-2">
          <div class="label px-0 pb-1"><span class="label-text font-medium">프로모션 / 이벤트 안내</span></div>
          <textarea class="textarea textarea-bordered w-full" rows="2" [(ngModel)]="eventNotes" placeholder="사전등록 할인, 증정 이벤트 등"></textarea>
        </label>

        <label class="form-control md:col-span-2">
          <div class="label px-0 pb-1"><span class="label-text font-medium">썸네일 URL</span></div>
          <input class="input input-bordered w-full" type="text" [(ngModel)]="thumbnail" placeholder="https://..." />
        </label>
      </div>

      @if (errorMsg()) {
        <p class="text-error text-sm">{{ errorMsg() }}</p>
      }

      <div class="flex justify-end gap-2 pt-2">
        <button class="btn btn-ghost" (click)="navigateBack()">취소</button>
        <button class="btn btn-primary" [disabled]="loading()" (click)="onSubmit()">
          {{ loading() ? '저장 중...' : (isEdit ? '수정' : '등록') }}
        </button>
      </div>
    </div>
  </div>
</div>
