<div class="w-full max-w-4xl">
  <div class="mb-5">
    <h2 class="text-xl font-bold">문의 답변</h2>
  </div>

  @if (inquiry(); as item) {
    <div class="card bg-base-100 shadow-sm mb-4">
      <div class="card-body gap-3">
        <div class="flex items-center gap-2">
          <h3 class="text-base font-semibold flex-1">{{ item.title }}</h3>
          <span
            class="btn btn-xs whitespace-nowrap cursor-default pointer-events-none"
            [ngClass]="item.isAnswered ? 'btn-warning' : 'btn-outline btn-warning'"
          >{{ item.isAnswered ? '답변완료' : '답변대기' }}</span>
        </div>
        <div class="flex gap-4 text-sm text-base-content/50">
          <span>작성자: {{ item.authorName }}</span>
          <span>등록일: {{ item.createdAt | slice:0:10 }}</span>
        </div>
        <div class="divider my-0"></div>
        <p class="text-sm whitespace-pre-wrap leading-relaxed">{{ item.content }}</p>
      </div>
    </div>

    <div class="card bg-base-100 shadow-sm">
      <div class="card-body gap-4">
        <label class="form-control">
          <div class="label px-0 pb-2">
            <span class="label-text font-medium">답변 *</span>
            <span class="label-text-alt" [class.text-error]="answer.length >= ANSWER_MAX">
              {{ answer.length }} / {{ ANSWER_MAX }}
            </span>
          </div>
          <textarea
            class="textarea textarea-bordered w-full font-mono text-sm leading-relaxed"
            style="min-height: 16rem; resize: vertical;"
            [(ngModel)]="answer"
            placeholder="답변을 입력하세요"
            [maxlength]="ANSWER_MAX"
          ></textarea>
        </label>

        @if (errorMsg()) {
          <p class="text-error text-sm">{{ errorMsg() }}</p>
        }

        <div class="flex justify-end gap-2 pt-2">
          <button class="btn btn-ghost" (click)="navigateBack()">취소</button>
          <button class="btn btn-primary" [disabled]="loading()" (click)="onSubmit()">
            {{ loading() ? '저장 중...' : '저장' }}
          </button>
        </div>
      </div>
    </div>
  } @else if (errorMsg()) {
    <div class="alert alert-error">
      <span>{{ errorMsg() }}</span>
      <button class="btn btn-sm btn-ghost ml-auto" (click)="navigateBack()">목록으로</button>
    </div>
  } @else {
    <div class="flex justify-center py-20">
      <span class="loading loading-spinner loading-lg"></span>
    </div>
  }
</div>
