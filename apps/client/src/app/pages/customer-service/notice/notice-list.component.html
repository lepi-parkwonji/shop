<div>
  <div class="mb-4">
    <app-search-input
      inputClass="text-sm"
      placeholder="제목 또는 내용 검색"
      [suggestions]="suggestions()"
      (queryChange)="onQueryChange($event)"
      (search)="onSearch($event)"
      (select)="onSelect($event)"
    />
  </div>

  <div class="card bg-base-100 shadow-sm">
    <table class="table table-zebra">
      <thead>
        <tr>
          <th class="w-16 hidden sm:table-cell text-center">번호</th>
          <th>제목</th>
          <th class="w-28 hidden sm:table-cell text-center">작성일</th>
        </tr>
      </thead>
      <tbody>
        @for (item of result()?.items; track item.id) {
          <tr class="cursor-pointer hover" [routerLink]="[item.id]">
            <td class="text-sm text-base-content/50 hidden sm:table-cell text-center">{{ item.id }}</td>
            <td>
              <span class="text-[15px] font-medium">{{ item.title }}</span>
              @if (item.isPinned) {
                <span class="badge badge-warning badge-sm ml-2">공지</span>
              }
            </td>
            <td class="text-sm text-base-content/60 hidden sm:table-cell text-center">{{ item.createdAt | slice:0:10 }}</td>
          </tr>
        } @empty {
          <tr><td colspan="3" class="text-center text-base-content/40 py-10">등록된 공지사항이 없습니다.</td></tr>
        }
      </tbody>
    </table>
  </div>

  @if (result(); as pagedResult) {
    <app-pagination
      [pageNo]="pageNo()"
      [totalPages]="pagedResult.pageInfo.totalPages"
      [totalItems]="pagedResult.pageInfo.totalItems"
      (pageChange)="changePage($event)"
    />
  }
</div>
