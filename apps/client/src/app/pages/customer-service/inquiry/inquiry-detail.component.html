@if (inquiry(); as item) {
  <div>
    <div class="card bg-base-100 shadow-sm">
      <div class="card-body">
        <div class="border-b border-base-200 pb-4 mb-4">
          <h2 class="text-xl font-bold">{{ item.title }}</h2>
          <p class="text-sm text-base-content/50 mt-1">
            {{ item.authorName }} · {{ item.createdAt | date:'yyyy-MM-dd' }}
          </p>
        </div>
        <div class="whitespace-pre-wrap leading-relaxed">{{ item.content }}</div>
      </div>
    </div>

    @if (item.isAnswered && item.answer) {
      <div class="card bg-base-200 shadow-sm mt-4">
        <div class="card-body">
          <h3 class="font-semibold text-sm text-base-content/60 mb-2">답변</h3>
          <div class="prose max-w-none" [innerHTML]="item.answer"></div>
        </div>
      </div>
    }

    <div class="mt-4">
      <a routerLink="../" class="btn btn-ghost btn-sm">← 목록으로</a>
    </div>
  </div>
} @else if (error()) {
  <div class="text-center py-10 text-base-content/40">{{ error() }}</div>
} @else {
  <div class="flex justify-center py-10"><span class="loading loading-spinner"></span></div>
}
