<div>
  <div class="mb-4">
    <app-search-input
      placeholder="질문 또는 답변 검색"
      [suggestions]="suggestions()"
      (queryChange)="onQueryChange($event)"
      (search)="onSearch($event)"
      (select)="onSelect($event)"
    />
  </div>

  <div class="card bg-base-100 shadow-sm">
    @if (result()?.items?.length === 0) {
      <div class="text-center text-base-content/40 py-10">등록된 FAQ가 없습니다.</div>
    } @else {
      <div class="divide-y divide-base-200">
        @for (item of result()?.items; track item.id) {
          <div class="collapse collapse-arrow">
            <input type="checkbox" />
            <div class="collapse-title font-medium flex items-center gap-2">
              @if (item.isPinned) {
                <span class="badge badge-warning badge-xs shrink-0">고정</span>
              }
              {{ item.question }}
            </div>
            <div class="collapse-content text-base-content/70 leading-relaxed prose prose-sm max-w-none" [innerHTML]="item.answer"></div>
          </div>
        }
      </div>
    }
  </div>

  @if (result(); as pagedResult) {
    <app-pagination
      [pageNo]="pageNo()"
      [totalPages]="pagedResult.pageInfo.totalPages"
      [totalItems]="pagedResult.pageInfo.totalItems"
      (pageChange)="changePage($event)"
    />
  }
</div>
