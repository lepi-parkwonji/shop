<header class="navbar bg-base-100 border-b border-base-200 px-4 lg:px-8 sticky top-0 z-50">
  <div class="navbar-start">
    <div class="dropdown lg:hidden">
      <button tabindex="0" class="btn btn-ghost btn-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <ul tabindex="0" class="menu menu-sm dropdown-content bg-base-100 rounded-box z-50 mt-3 w-52 p-2 shadow">
        <li><a routerLink="/gallery" routerLinkActive="active">갤러리</a></li>
        <li><a routerLink="/pre-registration" routerLinkActive="active">사전등록</a></li>
        <li><a routerLink="/customer-service" routerLinkActive="active">고객센터</a></li>
      </ul>
    </div>
    <a routerLink="/" class="text-lg font-bold text-primary">박람회</a>
  </div>

  <div class="navbar-center hidden lg:flex">
    <ul class="menu menu-horizontal px-1 gap-1">
      <li><a routerLink="/gallery" routerLinkActive="active" class="rounded-btn">갤러리</a></li>
      <li><a routerLink="/pre-registration" routerLinkActive="active" class="rounded-btn">사전등록</a></li>
      <li><a routerLink="/customer-service" routerLinkActive="active" class="rounded-btn">고객센터</a></li>
    </ul>
  </div>

  <div class="navbar-end">
    @if (isLoggedIn()) {
      <div class="flex items-center gap-3">
        @if (user()?.profileImage) {
          <img [src]="user()!.profileImage" class="w-8 h-8 rounded-full object-cover" alt="프로필" />
        }
        <span class="text-sm font-semibold">{{ user()?.nickname }}님</span>
        <button class="btn btn-sm btn-outline" (click)="logout()">로그아웃</button>
      </div>
    } @else {
      <button class="btn btn-sm btn-primary" (click)="openModal()">로그인</button>
    }
  </div>
</header>

@if (showLoginModal()) {
  <div class="fixed inset-0 z-[100] flex items-center justify-center">
    <button class="absolute inset-0 bg-black/40 cursor-default" aria-label="모달 닫기" (click)="closeModal()"></button>
    <div class="relative z-10 bg-base-100 rounded-2xl shadow-xl w-full max-w-sm mx-4 p-8 text-center">
      <button class="btn btn-sm btn-circle btn-ghost absolute right-3 top-3" (click)="closeModal()">✕</button>
      <h3 class="font-bold text-xl mb-2">로그인</h3>
      <p class="text-sm text-base-content/60 mb-8">소셜 계정으로 간편하게 시작하세요</p>
      <button
        class="flex items-center justify-center gap-3 w-full rounded-xl py-3 px-4 font-semibold text-sm transition-opacity hover:opacity-90"
        style="background:#FEE500;color:#191919;"
        (click)="startKakaoLogin()"
      >
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd" clip-rule="evenodd"
            d="M10 1C5.03 1 1 4.13 1 8c0 2.47 1.61 4.64 4.04 5.89l-.97 4.12a.3.3 0 00.46.33L9.46 15A11 11 0 0010 15c4.97 0 9-3.13 9-7s-4.03-7-9-7z"
            fill="#191919"/>
        </svg>
        카카오로 시작하기
      </button>
    </div>
  </div>
}
