name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # Cache node_modules
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: corepack enable

      - run: npm ci
      # nx run-many 실행 전에 Prisma Client 생성
      - run: npx prisma generate

      # This enables task distribution via Nx Cloud
      # Run this command as early as possible, after dependencies are installed
      # Learn more at https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
      - run: npm exec -- nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="e2e"

      - run: npm exec -- playwright install --only-shell

      # Prepend any command with "nx record --" to record its logs to Nx Cloud
      - run: npm exec -- nx record -- echo Hello World
      - run: npm exec -- nx run-many -t lint test build typecheck e2e
      # Nx Cloud recommends fixes for failures to help you get CI green faster. Learn more: https://nx.dev/ci/features/self-healing-ci
      - run: npm exec -- nx fix-ci
        if: always()
